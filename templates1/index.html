<h2>Zapiski</h2>
<a href="#" onclick="logout()">Logout</a>
<hr>
<h3>Dodaj zapisek</h3>
<form id="noteForm">

    <input name="title" placeholder="Naslov"><br><br>
    <textarea name="content" placeholder="Vsebina"></textarea><br><br>

    <button type="submit">Dodaj</button>

</form>
<hr>
<h3>Seznam zapiskov</h3>

<div id="notes">
{% for note in notes %}
    <div id="note-{{note.doc_id}}">
        <h4>{{ note.title }}</h4>
        <p>{{ note.content }}</p>
        <button onclick="deleteNote({{note.doc_id}})">Delete</button>
        <hr>
    </div>
{% endfor %}
</div>

<script>
document.getElementById("noteForm").onsubmit = async function(e){
    e.preventDefault()

    let data = new FormData(this)

    let res = await fetch("/add", {
        method: "POST",
        body: data
    })

    let note = await res.json()

    document.getElementById("notes").innerHTML += `
        <div id="note-${note.id}">
            <h4>${note.title}</h4>
            <p>${note.content}</p>
            <button onclick="deleteNote(${note.id})">Delete</button>
            <hr>
        </div>
    `
}

async function deleteNote(id){
    await fetch("/delete/" + id)
    document.getElementById("note-" + id).remove()
}

async function logout(){
    await fetch("/logout")
    location.reload()
}
</script>
