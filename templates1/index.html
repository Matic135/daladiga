<h2>Zapiski</h2>

<a href="/logout">Logout</a>

<hr>

<h3>Dodaj zapisek</h3>

<form method="POST" action="/add">

    <p>Naslov</p>
    <input name="title">

    <p>Vsebina</p>
    <textarea name="content"></textarea>

    <br><br>
    <button type="submit">Dodaj</button>

</form>

<hr>

<h3>Seznam zapiskov</h3>

{% for note in notes %}

    <h4>{{ note.title }}</h4>
    <p>{{ note.content }}</p>

    <a href="/delete/{{ note.doc_id }}">Delete</a>

    <hr>

{% endfor %}
